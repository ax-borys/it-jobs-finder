services:
  api:
    build: .
    image: job-parser:api
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "3000:80"
    depends_on:
      db:
        condition: service_healthy
        restart: true

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready -U $$DB_USER -d $$DB_NAME
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 10s
      start_interval: 2s
