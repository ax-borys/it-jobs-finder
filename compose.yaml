services:
  api:
    build: .
    image: job-parser:api
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "3000:80"
    depends_on:
      - db

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
